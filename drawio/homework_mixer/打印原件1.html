<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学雷锋，树新风 - 打印原件</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: HarmonyOS Sans SC;
            user-select: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        @font-face {
            font-family: HarmonyOS Sans SC;
            src: url(/static/HarmonyOS_Sans_SC_Regular.ttf);
            font-display: block;
        }

        .canvas {
            width: 14.85cm;
            height: 10.5cm;
            border: #aaa 1px solid;
            padding: 12px;
        }

        .main-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .main {
            border: #6FBAE1 12px solid;
            background: linear-gradient(113.85deg, #f0f0f4 0%, #badaff 100%);
            width: 100%;
            height: 100%;
        }

        #title {
            margin: 7px 0 0 10px;
            font-size: 50px;
            color: #E94043;
            -webkit-text-stroke: #E94043 .2px;
            text-shadow: 3px 2px 1px #f2b8b8;
        }

        .info {
            text-align: right;
            width: 100%;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">

        <div class="canvas">
            <div class="main">
                
                <h1 id="title">学雷锋&nbsp;树新风</h1>
                
            </div>
        </div>
        
        <p class="info">尺寸: ISO A4 210mm×297mm<br>由HTML5&CSS3提供排版技术支持</p>

    </div>
</body>
</html>
