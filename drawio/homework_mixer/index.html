<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给家庭作业来点科技与狠活！- HOMEWORK MIXER</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            color: #fff;
            user-select: none;
        }

        @font-face {
            font-family: "Comic Sans MS";
            src: url(/static/Comic\ Sans\ MS.ttf);
            font-display: block;
        }

        body {
            background: #f7ad0f;
            min-width: 1510px;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .big-title {
            letter-spacing: 14px;
            font-size: 96px;
            background: #cc2b5e;  /* fallback for old browsers */
            background: -webkit-linear-gradient(to right, #753a88, #cc2b5e);  /* Chrome 10-25, Safari 5.1-6 */
            background: linear-gradient(to right, #753a88, #cc2b5e); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */

            background-clip: text;
            font-family: "Comic Sans MS";
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .sub-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 6px;
            text-align: center;
        }

        hr {
            background-color: #fff;
            margin: 60px 0;
            width: 60%;
            height: .6px;
            border: none;
        }

        a {
            text-decoration: none;
            transition: .2s linear;
        }

        a:hover, a:focus-visible {
            color: #f40b0b;
            text-decoration: underline;
            text-decoration-thickness: 0.2px;
        }

        :focus{
            outline: .6px dashed #fff;
        }

        ul li {
            font-size: 26px;
            list-style-type: disc;
        }

        sub {
            vertical-align: baseline;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="content">

        <div class="title-box">
            <h1 class="big-title">HOMEWORK&nbsp;&nbsp;MIXER</h1>
            <h2 class="sub-title">给家庭作业来点科技与狠活！</h2>
        </div>
        <hr>
        <div class="works">
            <ul>
                <li><a href="打印原件1.html">学雷锋，树新风手抄报<sub>(打印原件)</sub></a></li>
            </ul>
        </div>

    </div>
</body>
</html>
