<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Monaco Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/editor/editor.main.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .app {
            width: 67%;
            height: 80%;
        }
    </style>
</head>
<body>
    

    <div class="app">
        <div id="container" style="width:100%; height: 100%; border: red solid 1px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/loader.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs' }});
        require(['vs/editor/editor.main'], function () {
            monaco.editor.create(document.getElementById('container'), {
                value: [
                    'function x() {',
                    '\tconsole.log("Hello world!");',
                    '}',
                    '',
                    'class Evaluator {',
                    '\tconstructor() {',
                    '\t\tconst url = \'https://www.example.com/\'',
                    '\t}',
                    '}',
                ].join('\n'),
                language: 'javascript',
                theme: 'vs'
            });
        });
    </script>

</body>
</html>
