<!DOCTYPE html>
<html lang="zh-CN" class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Radio Reunion</title>
    <link rel="stylesheet" href="/mdui/mdui.css">
    <script src="/mdui/mdui.global.js"></script>
    <link rel="stylesheet" href="/mdui/material-icons.css">
    <link rel="stylesheet" href="/mdui/material-icons-outlined.css">
    <link rel="stylesheet" href="/mdui/fallback_icons/material-icons-fallback.css">
    <link rel="stylesheet" href="/mdui/fallback_icons/material-icons-outlined-fallback.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <div class="app_page" id="app_page__main">
        <header>
            <div class="header__title home_page__title">Radio <span style="font-weight: 600;">Reunion</span></div>
            <div class="header__account_box">
                <div class="header__account__login_wrapper">
                    <mdui-tooltip content="登录到网易云账户" placement="bottom-left">
                        <mdui-button-icon icon="account_circle--outlined" class="login__button"></mdui-button-icon>
                    </mdui-tooltip>
                </div>
                <div class="header__account__user_wrapper">
                    <mdui-dropdown class="account__menu">
                        <mdui-button-icon slot="trigger">
                            <mdui-avatar class="header__avatar"></mdui-avatar>
                        </mdui-button-icon>
                        <mdui-menu>
                            <mdui-menu-item class="header__username" disabled></mdui-menu-item>
                            <mdui-menu-item class="account__logout" icon="logout--outlined">退出登录</mdui-menu-item>
                        </mdui-menu>
                    </mdui-dropdown>
                </div>
            </div>
        </header>
        <main>
            <div class="welcome">
                <div class="welcome__illustration"></div>
                <div class="welcome__text">欢迎来到 Radio Reunion，敬请沉浸在音乐的韵律中 🎵</div>
            </div>
            <div class="start_options">
                <mdui-list class="start__options_list">
                    <mdui-list-item rounded id="start__url_option" description="输入流或播放列表的 URL." icon="public">输入在线流地址</mdui-list-item>
                    <mdui-list-item rounded id="start__search_option" description="在线查找歌曲和电台" icon="search">查找歌曲/电台</mdui-list-item>
                    <mdui-list-item rounded id="start__featured_option" description="浏览精选电台和歌曲列表" icon="recommend--outlined">推荐列表</mdui-list-item>
                </mdui-list>
            </div>

            <mdui-divider style="width: 81%;"></mdui-divider>
            <div class="discover">
                <mdui-card class="discover__card">
                    <mdui-icon name="radio--outlined"></mdui-icon>
                    <div class="discover__card__title">私人 FM</div>
                    <mdui-button-icon icon="play_circle--outlined" class="personal_fm__start"></mdui-button-icon>
                    <mdui-button-icon icon="skip_next--outlined" class="personal_fm__skip"></mdui-button-icon>
                    <mdui-button-icon icon="stop_circle--outlined" class="personal_fm__stop"></mdui-button-icon>
                </mdui-card>
            </div>
        </main>
    </div>

    <div class="app_page" id="app_page__search">
        <header>
            <mdui-button-icon icon="arrow_back" class="header__back_btn"></mdui-button-icon>
            <div class="header__title">搜索</div>
        </header>
        <main>
            <div class="search__container">
                <mdui-dropdown trigger="focus" placement="bottom" class="search__history_dropdown">
                    <mdui-text-field class="search__input" clearable variant="outlined" clear-icon="close" placeholder="查找歌曲和电台..." type="search" icon="search" slot="trigger"></mdui-text-field>
                    <mdui-menu class="search__history_list" dense>
                        <mdui-menu-item class="search__clear_history" end-icon="search_off">清除搜索历史</mdui-menu-item>
                    </mdui-menu>
                </mdui-dropdown>
            </div>
            <div class="search__result">
                <mdui-tabs value="songs" full-width variant="secondary" class="search__tabs">
                    <mdui-tab value="songs" icon="music_note--outlined" inline>歌曲</mdui-tab>
                    <mdui-tab value="stations" icon="radio--outlined" inline>电台</mdui-tab>

                    <mdui-tab-panel slot="panel" value="songs">
                        <div class="search__loading">
                            <mdui-circular-progress></mdui-circular-progress>
                        </div>
                        <div class="search__result_stats"></div>
                        <mdui-list class="search__result_list"></mdui-list>
                    </mdui-tab-panel>
                    
                    <mdui-tab-panel slot="panel" value="stations">
                        <div class="stations__loading">
                            <mdui-circular-progress></mdui-circular-progress>
                        </div>
                        <mdui-list class="stations__result_list"></mdui-list>
                    </mdui-tab-panel>
                </mdui-tabs>
            </div>
        </main>
    </div>

    <div class="app_page" id="app_page__featured">
        <header>
            <mdui-button-icon icon="arrow_back" class="header__back_btn"></mdui-button-icon>
            <div class="header__title">推荐列表</div>
        </header>
        <main>
            <div class="featured__container">
                <mdui-tabs value="radio_stations" full-width variant="secondary">
                    <mdui-tab value="radio_stations" icon="radio--outlined" inline>电台</mdui-tab>

                    <mdui-tab-panel slot="panel" value="radio_stations">
                        <mdui-list class="featured__radio_stations_list"></mdui-list>
                    </mdui-tab-panel>
                </mdui-tabs>
                <div class="featured__loading_container">
                    <mdui-circular-progress class="featured__loading"></mdui-circular-progress>
                </div>
            </div>
        </main>
    </div>

    <div class="app_page" id="app_page__lyrics">
        <header>
            <mdui-button-icon icon="arrow_back" class="header__back_btn"></mdui-button-icon>
            <div class="header__title">歌词详情</div>
            <div class="detail__actions">
                <mdui-dropdown placement="bottom-end" stay-open-on-click>
                    <mdui-button-icon icon="more_vert" slot="trigger" class="detail__more_btn"></mdui-button-icon>
                    <mdui-menu submenu-trigger="click focus hover" selects="single" value="show-translation" class="details__menu">
                        <mdui-menu-item class="detail__see_mv" disabled icon="movie--outlined">查看 MV</mdui-menu-item>
                        <mdui-menu-item class="detail__view_comments" icon="rate_review--outlined">评论</mdui-menu-item>
                        <mdui-menu-item>
                            歌词选项
                            <mdui-menu-item slot="submenu" value="show-translation">显示翻译</mdui-menu-item>
                            <mdui-menu-item slot="submenu" value="show-notations">显示注音</mdui-menu-item>
                        </mdui-menu-item>
                    </mdui-menu>
                </mdui-dropdown>
            </div>
        </header>
        <main>
            <div class="lyrics__loading_wrapper">
                <mdui-circular-progress class="lyrics__loading"></mdui-circular-progress>
            </div>
            <div class="lyrics__detail__wrapper">
                <div class="album__info_wrapper">
                    <div class="lyrics__album__cover"></div>
                </div>
                <div class="lyrics__container">
                    <ul></ul>
                </div>
            </div>
        </main>
    </div>

    <div class="app_page" id="app_page__mv">
        <header>
            <mdui-button-icon icon="arrow_back" class="header__back_btn"></mdui-button-icon>
            <div class="header__title">MV 详情</div>
        </header>
        <main>
            <div class="mv__title"></div>
            <video controls class="mv__video"></video>
        </main>
    </div>

    <div class="app_page" id="app_page__comments">
        <header>
            <mdui-button-icon icon="arrow_back" class="header__back_btn"></mdui-button-icon>
            <div class="header__title">评论</div>
        </header>
        <main>
            <div class="comments__list"></div>
        </main>
        <mdui-dialog headline="评论回复" icon="comment--outlined" class="comments__replies_dialog" close-on-overlay-click close-on-esc>
            <div class="comments__replies_list"></div>
        </mdui-dialog>
    </div>

    <div class="app_page" id="app_page__auth">
        <header>
            <mdui-button-icon icon="arrow_back" class="header__back_btn"></mdui-button-icon>
            <div class="header__title">登录您的账户</div>
        </header>
        <main>
            <div class="login__container">
                <mdui-card class="login__card" variant="elevated">
                    <div class="login__icon"></div>
                    <div class="login__form_wrapper login__email_wrapper">
                        <div class="login__input_wrapper">
                            <mdui-text-field icon="email--outlined" placeholder="邮箱" type="email" class="login_email__email_input"></mdui-text-field>
                            <mdui-text-field icon="password--outlined" placeholder="密码" type="password" toggle-password class="login_email__pasword_input"></mdui-text-field>
                        </div>
                        <mdui-button class="login__login_email_btn login__login_btn" full-width variant="tonal">登录</mdui-button>
                    </div>
                    <div class="login__form_wrapper login__qr_wrapper">
                        <img alt="qrcode" class="login__qr__img">
                        <a href="javascript:;" class="login__qr__link" target="_blank">网页登录</a>
                        <div class="login__form__qr__info">扫描二维码登录</div>
                    </div>
                    <div class="login__methods_wrapper">
                        <mdui-button-icon icon="qr_code_scanner" class="login__qr_method_btn"></mdui-button-icon>
                        <mdui-button-icon icon="person--outlined" class="login__account_method_btn"></mdui-button-icon>
                    </div>
                </mdui-card>
            </div>
        </main>
    </div>

    <div class="player">
        <div class="player__container">
            <div class="player__loading">
                <mdui-circular-progress></mdui-circular-progress>
            </div>
            <div class="player__cover"></div>
            <div class="player__info">
                <div class="player__title">Radio Reunion</div>
                <div class="player__artist">团结电台</div>
                <div class="player__progress">
                    <div class="player__time_elapsed">0:00</div>
                    <mdui-slider id="player__progress" value="0" step="1" min="0" max="100" class="player__progress-bar" nolabel disabled></mdui-slider>
                    <div class="player__duration">0:00</div>
                </div>
            </div>
            <div class="player__controls">
                <div class="player__playback">
                    <mdui-fab icon="play_arrow" class="player__playback_btn"></mdui-fab>
                </div>
                <div class="player__playlist">
                    <mdui-button-icon icon="playlist_play" class="player__playlist_btn"></mdui-button-icon>
                </div>
            </div>
        </div>
    </div>

    <mdui-navigation-drawer class="playlist" placement="right" close-on-esc close-on-overlay-click modal>
        <div class="playlist__header">
            <div class="playlist__title">播放列表<mdui-badge class="playlist__title_badge"></mdui-badge></div>
            <mdui-button-icon icon="repeat" class="playback__ordering_btn"></mdui-button-icon>
            <mdui-button-icon icon="clear_all" class="playlist__clear_btn"></mdui-button-icon>
        </div>
        <mdui-list class="playlist__playlist"></mdui-list>
    </mdui-navigation-drawer>

    <div class="welcome_overlay">
        <div class="welcome__content">
            <div class="header__title">Radio <span style="font-weight: 600;">Reunion</span></div>
            <div class="welcome__desc">
                <mdui-icon name='headphones'></mdui-icon>
                <div>请佩戴耳机以享受最佳体验。</div>
            </div>
        </div>
    </div>

    <audio id="player-audio"></audio>

    <script>
        // welcome screen
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                welcomeOverlay.style.opacity = 0;
                setTimeout(() => {
                    welcomeOverlay.style.display = 'none';
                }, 300)
            }, 1000);
        });
    </script>

    <script src="./script.js"></script>
    <script src="./search.js"></script>
    <script src="./featured.js"></script>
    <script src="./ui.js"></script>
    <script src="./responsive.js"></script>
    <script src="./lyrics.js"></script>
    <script src="./mv.js"></script>
    <script src="./auth.js"></script>
    <script src="./comments.js"></script>
    <script src="./for_you.js"></script>

</body>
</html>
