<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日「一言」</title>
    <!-- <script type="text/javascript" src="https://api.vvhan.com/api/ian?type=js"></script>
    <script>vhan()</script> -->
</head>
<body>
    <!-- <br><br><br><br><br><br><br> -->
    <p class="iyan">正在获取...</p>
    <p>每日「一言」</p>
    <img src="static/refresh.svg" alt="刷新" title="获取「一言」" onclick="getIyan()">
    <style>

        * {
            text-align: center;
            cursor: url(static/cursor.png), auto;
        }

        img {
            cursor: pointer;
        }

        body {
            background-color: whitesmoke;
            margin-left: 160px;
            margin-right: 160px;
        }
        
        ::selection {
            color: whitesmoke;
            background-color: rgb(242, 173, 26);
        }
        
        .iyan {
            font-family: "微软雅黑";
            /* font-weight: normal; */
            font-size: 32px;
            margin-top: 40vh;
        }
        
        p {
            font-family: '微软雅黑';
            font-weight: lighter;
            font-size: medium;
        }

        </style>
        <script>
            var apis = ['http://api.52hyjs.com/api/yulu?code=json', 'https://api.vvhan.com/api/ian?cl=wx'];
            function getIyan(){
                var random = Math.random();
                if (random < 0.5){
                    var random = 0;
                } else {
                    var random = 1;
                };
                console.log('%c------------\n%c' + random + ' ' + apis[random],
                'font-weight: bold; color: darkred', 'font-weight: normal; color: black;');
                const iyanElement = document.body.querySelector('.iyan');
                iyanElement.textContent = "正在获取...";
                fetch(apis[random])
                    .then(response => {
                        if (random == 0){
                            return response.json();
                        } else {
                            return response.text();
                        }
                    })
                    .then(data => {
                        // 处理获取到的数据
                        if (random == 0){
                            iyanElement.textContent = data['msg'];
                            console.log(data['msg']);
                        } else {
                            iyanElement.textContent = data;
                            console.log(data);
                        }
                    });
            };
        </script>
        <script>getIyan()</script>
</body>
</html>
